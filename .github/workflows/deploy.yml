name: Deploy PTGR PAY Compliance

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-compliance-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE: millionmulugeta/compliance-service
  DOCKER_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.DOCKER_TAG }}
          no-cache: true
          pull: true

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail

            APP_DIR=~/remittance-backend
            LAST_TAG_FILE=${APP_DIR}/.last_deployed_compliance
            NEW_TAG=${{ env.DOCKER_TAG }}
            IMAGE=${{ env.BACKEND_IMAGE }}
            CONTAINER_NAME=compliance-backend

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "Deploying ${IMAGE}:${NEW_TAG} to server ${HOSTNAME:-localhost}"

            LAST_TAG=""
            if [ -f "$LAST_TAG_FILE" ]; then
              LAST_TAG=$(cat "$LAST_TAG_FILE" || true)
            fi
            echo "Last deployed tag: ${LAST_TAG:-<none>}"

            echo "Pulling new image ${IMAGE}:${NEW_TAG} ..."
            set +e
            PULL_OUT=$(sudo docker pull "${IMAGE}:${NEW_TAG}" 2>&1)
            PULL_EC=$?
            set -e
            if [ "${PULL_EC}" -ne 0 ]; then
              echo "${PULL_OUT}"
              echo "Docker pull failed (exit=${PULL_EC})."
              exit "${PULL_EC}"
            fi

            echo "Stopping and removing existing compliance-service container (if any)..."
            sudo docker compose -f docker-compose.prod.yml stop compliance-service || true
            sudo docker compose -f docker-compose.prod.yml rm -f compliance-service || true

            echo "Starting new compliance-service container using ${IMAGE}:${NEW_TAG} ..."
            sudo env COMPLIANCE_SERVICE_IMAGE="${IMAGE}:${NEW_TAG}" docker compose -f docker-compose.prod.yml up -d --no-deps compliance-service

            echo "Waiting for compliance-service to become healthy..."
            sleep 5
            
            health_check() {
              sudo docker exec ${CONTAINER_NAME} curl -f -s "$1" > /dev/null 2>&1
            }
            SUCCESS=false
            HEALTH_URL=""
            for i in $(seq 1 10); do
              echo "Health check attempt $i/10..."
              for url in "http://localhost:3000/health"; do
                set +e
                HEALTH_OUT=$(sudo docker exec ${CONTAINER_NAME} sh -lc "
                  set -e
                  curl -f -sS -m 3 -D - ${url} -o /tmp/health.body
                " 2>&1)
                HEALTH_EC=$?
                set -e
                if [ "${HEALTH_EC}" -eq 0 ]; then
                  SUCCESS=true
                  HEALTH_URL="$url"
                  break 2
                fi
              done
              sleep 3
            done
            if [ "${SUCCESS}" = "true" ]; then
              echo "Healthy at ${HEALTH_URL}"
            fi

            if [ "${SUCCESS}" != "true" ]; then
              echo "ERROR: Health check failed"
              echo "Container logs (last 100 lines):"
              sudo docker logs ${CONTAINER_NAME} --tail 100 2>/dev/null || true
              
              if [ -n "${LAST_TAG}" ]; then
                echo "Rolling back to last tag: ${LAST_TAG}"
                if sudo docker pull "${IMAGE}:${LAST_TAG}" 2>/dev/null; then
                  sudo env COMPLIANCE_SERVICE_IMAGE="${IMAGE}:${LAST_TAG}" docker compose -f docker-compose.prod.yml up -d --no-deps compliance-service || true
                  exit 0
                fi
              fi
              echo "Rollback failed or not possible   manual intervention required"
              exit 1
            fi

            echo "${NEW_TAG}" > "${LAST_TAG_FILE}"
            echo "Deployment successful. Saved ${NEW_TAG} to ${LAST_TAG_FILE}"
            sudo docker image prune -f 2>/dev/null || true

